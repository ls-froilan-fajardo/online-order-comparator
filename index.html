<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Order Price Comparator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="top-nav">
        <div class="nav-brand">
            ONLINE ORDER PRICE COMPARATOR
            <span id="help-btn" class="help-btn" title="How to use">?</span>
        </div>
        
        <div class="upload-group">
            <label>Lightspeed formatted file:</label>
            <input type="file" id="csv-all" accept=".csv">
        </div>
        
        <div class="upload-group">
            <label>Prices only:</label>
            <input type="file" id="csv-prices" accept=".csv">
        </div>

        <button id="btn-reset" class="btn-reset">Reset Data</button>
    </nav>

    <main id="main-workspace">
        <div id="output-placeholder" class="placeholder-text">
            <h3>Ready to process.</h3>
            <p>Upload both CSV files above to automatically generate the table and paste a JSON payload on the right.</p>
        </div>

        <div id="action-bar" style="display: none; gap: 20px;">
            
            <div class="action-half" style="flex-wrap: wrap;">
                <div class="filter-group">
                    <label for="type-filter">Type:</label>
                    <select id="type-filter"></select>
                </div>
                <div class="filter-group">
                    <label for="profile-filter">Profile:</label>
                    <select id="profile-filter"></select>
                </div>
                <div class="filter-group" style="margin-left: 10px;">
                    <label for="tax-type" style="color: #d69e2e;">Mode:</label>
                    <select id="tax-type">
                        <option value="exclusive">Tax Exclusive</option>
                        <option value="inclusive">Tax Inclusive</option>
                    </select>
                </div>

                <div style="display: flex; gap: 10px; margin-top: 5px; width: 100%;">
                    <div class="filter-group">
                        <label style="color: #319795;">T1%:</label>
                        <input type="number" id="tax-input-1" class="tax-input" placeholder="0" value="0" min="0" step="0.1">
                    </div>
                    <div class="filter-group">
                        <label style="color: #3182ce;">T2%:</label>
                        <input type="number" id="tax-input-2" class="tax-input" placeholder="0" value="0" min="0" step="0.1">
                    </div>
                    <div class="filter-group">
                        <label style="color: #805ad5;">T3%:</label>
                        <input type="number" id="tax-input-3" class="tax-input" placeholder="0" value="0" min="0" step="0.1">
                    </div>
                    <div class="filter-group">
                        <label style="color: #dd6b20;">T4%:</label>
                        <input type="number" id="tax-input-4" class="tax-input" placeholder="0" value="0" min="0" step="0.1">
                    </div>
                </div>
            </div>

            <div class="action-half">
                <div style="display: flex; flex-direction: column; width: 100%; gap: 10px;">
                    <div style="display: flex; align-items: center; gap: 10px; width: 100%;">
                        <label for="json-input" style="white-space: nowrap;">JSON Extractor:</label>
                        <input type="text" id="json-input" placeholder="Paste your raw JSON text or server log here...">
                    </div>
                    
                    <div id="totals-badge" style="display: none; gap: 10px; align-items: center;">
                        <span id="badge-paid" style="background: #e6fffa; color: #234e52; border: 1px solid #319795; padding: 6px 10px; border-radius: 4px; font-weight: bold; font-size: 0.85rem; white-space: nowrap;"></span>
                        <span id="badge-calc" style="background: #fff5f5; color: #9b2c2c; border: 1px solid #e53e3e; padding: 6px 10px; border-radius: 4px; font-weight: bold; font-size: 0.85rem; white-space: nowrap;"></span>
                    </div>
                </div>
            </div>
            
        </div>

        <div id="content-area">
            
            <div id="left-panel">
                <div id="accounting-groups"></div>
                <div id="table-container"></div>
            </div>

            <div id="json-panel">
                <div id="json-display"></div>
            </div>
            
        </div>
    </main>

    <div id="modal-backdrop"></div>
    <div id="custom-modal">
        <div id="custom-modal-title" class="modal-header">Item Details</div>
        <div id="custom-modal-text"></div>
        <button id="custom-modal-close">Close</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
